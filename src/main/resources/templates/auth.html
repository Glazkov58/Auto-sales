<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация | AutoMarket</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-color: #fd0d0d;
            --secondary-color: #6c757d;
            --accent-color: #dc3545;
        }
        body {
            background: url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
        }
        .auth-overlay {
            background-color: rgba(0, 0, 0, 0.7);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .auth-container {
            max-width: 450px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 10px;
            background-color: rgba(255, 255, 255, 0.95);
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.3);
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 25px;
        }
        .auth-logo img {
            height: 60px;
        }
        .auth-title {
            color: var(--primary-color);
            font-weight: 700;
            text-align: center;
            margin-bottom: 25px;
        }
        .form-control {
            padding: 12px 15px;
            border-radius: 5px;
        }
        .form-floating label {
            padding: 0.8rem 0.75rem;
            color: var(--secondary-color);
        }
        .btn-login {
            background-color: var(--accent-color);
            border: none;
            padding: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-login:hover {
            background-color: #c82333;
            transform: translateY(-2px);
        }
        .auth-footer {
            text-align: center;
            margin-top: 20px;
            color: var(--secondary-color);
        }
        .auth-footer a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 500;
        }
        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
        }
        .divider::before, .divider::after {
            content: "";
            flex: 1;
            border-bottom: 1px solid #dee2e6;
        }
        .divider-text {
            padding: 0 10px;
            color: var(--secondary-color);
        }
    </style>
</head>
<body>
    <div class="auth-overlay">
        <div class="container">
            <div class="auth-container">
                <div class="auth-logo">
                    <a href="/">
                        <img src="/static/Car.png" alt="AutoMarket">
                        </a>
                </div>
                
                <h2 class="auth-title">
                    <i class="bi bi-car-front-fill"></i> Вход в личный кабинет
                </h2>
                
                <form>
                    <div class="form-floating mb-3">
                        <input type="email" class="form-control" id="email" placeholder="name@example.com">
                        <label for="email"><i class="bi bi-envelope me-2"></i>Email адрес</label>
                    </div>
                    
                    <div class="form-floating mb-3">
                        <input type="password" class="form-control" id="password" placeholder="Пароль">
                        <label for="password"><i class="bi bi-lock me-2"></i>Пароль</label>
                    </div>
                    
                    <div class="d-flex justify-content-between mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="remember">
                            <label class="form-check-label" for="remember">Запомнить меня</label>
                        </div>
                        <a href="#" class="text-decoration-none">Забыли пароль?</a>
                    </div>
                    
                    <button type="submit" class="btn btn-login btn-primary w-100 mb-3">
                        <i class="bi bi-box-arrow-in-right me-2"></i> Войти
                    </button>
                    
                    <div class="divider">
                        <span class="divider-text">или войти через</span>
                    </div>
                    
                    <div class="row g-2 mb-3">
                        <div class="col-md-6">
                            <button type="button" class="btn btn-outline-primary w-100">
                                <i class="bi bi-google me-2"></i> Google
                            </button>
                        </div>
                        <div class="col-md-6">
                            <button type="button" class="btn btn-outline-dark w-100">
                                <i class="bi bi-apple me-2"></i> Apple
                            </button>
                        </div>
                    </div>
                </form>
                
                <div class="auth-footer">
                    Еще нет аккаунта? <a href="/reg">Зарегистрироваться</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
