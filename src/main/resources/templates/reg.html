<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация | AutoMarket</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-color: #0d6efd;
            --secondary-color: #6c757d;
            --accent-color: #ff0000;
        }
        body {
            background: url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
        }
        .auth-overlay {
            background-color: rgba(0, 0, 0, 0.7);
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 20px 0;
        }
        .auth-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 10px;
            background-color: rgba(255, 255, 255, 0.95);
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.3);
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 25px;
        }
        .auth-logo img {
            height: 60px;
        }
        .auth-title {
            color: var(--accent-color);
            font-weight: 700;
            text-align: center;
            margin-bottom: 25px;
        }
        .form-control {
            padding: 12px 15px;
            border-radius: 5px;
        }
        .form-floating label {
            padding: 0.8rem 0.75rem;
            color: var(--secondary-color);
        }
        .btn-register {
            background-color: var(--accent-color);
            border: none;
            padding: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-register:hover {
            background-color: #e00000;
            transform: translateY(-2px);
        }
        .auth-footer {
            text-align: center;
            margin-top: 20px;
            color: var(--secondary-color);
        }
        .auth-footer a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 500;
        }
        .password-strength {
            height: 5px;
            margin-top: 5px;
            border-radius: 5px;
            transition: all 0.3s;
        }
        .form-text {
            font-size: 0.85rem;
        }
        .progress-bar {
            background-color: var(--accent-color);
        }
    </style>
</head>
<body>
    <div class="auth-overlay">
        <div class="container">
            <div class="auth-container">
                <div class="auth-logo">
                    <a href="/">
                        <img src="/static/Car.png" alt="AutoMarket">
                    </a>
                </div>
                
                <h2 class="auth-title">
                    <i class="bi bi-car-front-fill"></i> Создать аккаунт
                </h2>
                
                <form>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-floating mb-3">
                                <input type="text" class="form-control" id="firstName" placeholder="Иван">
                                <label for="firstName"><i class="bi bi-person me-2"></i>Имя</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-floating mb-3">
                                <input type="text" class="form-control" id="lastName" placeholder="Иванов">
                                <label for="lastName"><i class="bi bi-person me-2"></i>Фамилия</label>
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-floating mb-3">
                        <input type="email" class="form-control" id="email" placeholder="name@example.com">
                        <label for="email"><i class="bi bi-envelope me-2"></i>Email адрес</label>
                    </div>
                    
                    <div class="form-floating mb-3">
                        <input type="tel" class="form-control" id="phone" placeholder="+7 (999) 123-45-67">
                        <label for="phone"><i class="bi bi-phone me-2"></i>Телефон</label>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-floating mb-3 position-relative">
                                <input type="password" class="form-control" id="password" placeholder="Пароль">
                                <label for="password"><i class="bi bi-lock me-2"></i>Пароль</label>
                                <div class="password-strength w-100"></div>
                                <div class="form-text">Минимум 8 символов</div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-floating mb-3">
                                <input type="password" class="form-control" id="confirmPassword" placeholder="Подтверждение пароля">
                                <label for="confirmPassword"><i class="bi bi-lock me-2"></i>Подтвердите пароль</label>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="terms">
                            <label class="form-check-label" for="terms">
                                Я принимаю <a href="#" class="text-decoration-none">условия использования</a> и <a href="#" class="text-decoration-none">политику конфиденциальности</a>
                            </label>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-register btn-primary w-100 mb-3">
                        <i class="bi bi-person-plus me-2"></i> Зарегистрироваться
                    </button>
                    
                    <div class="auth-footer">
                        Уже есть аккаунт? <a href="/auth">Войти</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Простая проверка сложности пароля
        document.getElementById('password').addEventListener('input', function(e) {
            const password = e.target.value;
            const strengthBar = document.querySelector('.password-strength');
            let strength = 0;
            
            if (password.length > 0) strength += 20;
            if (password.length >= 8) strength += 20;
            if (/[A-Z]/.test(password)) strength += 20;
            if (/[0-9]/.test(password)) strength += 20;
            if (/[^A-Za-z0-9]/.test(password)) strength += 20;
            
            strengthBar.style.width = strength + '%';
            strengthBar.style.backgroundColor = strength < 40 ? '#dc3545' : 
                                              strength < 80 ? '#ffc107' : '#28a745';
        });
    </script>
</body>
</html>
